name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag to build and publish, for example v0.6.1"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build and publish, for example v0.6.1"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: OneTiny
  CLI_NAME: onetiny-cli
  FRONTEND_DIR: frontend
  WAILS_VERSION: v3.0.0-alpha.98-tui

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Extract version from tag
        id: metadata
        env:
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  cli:
    name: CLI ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: prepare-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            goos: linux
            goarch: amd64
            binary: onetiny-cli
            artifact: onetiny-cli-linux-x64
          - target: windows-x64
            goos: windows
            goarch: amd64
            binary: onetiny-cli.exe
            artifact: onetiny-cli-windows-x64
          - target: darwin-x64
            goos: darwin
            goarch: amd64
            binary: onetiny-cli
            artifact: onetiny-cli-darwin-x64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            binary: onetiny-cli
            artifact: onetiny-cli-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build CLI
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ inputs.tag_name }}
        run: |
          mkdir -p "dist/${{ matrix.artifact }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/tcp404/OneTiny/internal/constant.VERSION=${VERSION}" \
            -o "dist/${{ matrix.artifact }}/${{ matrix.binary }}" \
            ./cmd/cli
          cd "dist/${{ matrix.artifact }}"
          zip -9 "../${{ matrix.artifact }}.zip" "${{ matrix.binary }}"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip
          if-no-files-found: error

  mac-app:
    name: macOS app
    runs-on: macos-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install build tools
        run: |
          brew install just librsvg
          go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"

      - name: Build macOS app
        env:
          VERSION: ${{ inputs.tag_name }}
        run: just package-mac

      - name: Archive macOS app
        run: |
          mkdir -p dist
          ditto -c -k --keepParent "build/bin/${APP_NAME}.app" "dist/onetiny-gui-darwin-arm64.zip"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v7
        with:
          name: onetiny-gui-darwin-arm64
          path: dist/onetiny-gui-darwin-arm64.zip
          if-no-files-found: error

  windows-gui:
    name: Windows GUI
    runs-on: windows-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Wails CLI
        run: go install "github.com/wailsapp/wails/v3/cmd/wails3@$env:WAILS_VERSION"

      - name: Build Windows GUI
        env:
          GOOS: windows
          GOARCH: amd64
          VERSION: ${{ inputs.tag_name }}
        run: |
          npm install --prefix "${env:FRONTEND_DIR}"
          npm run build --prefix "${env:FRONTEND_DIR}"

          New-Item -ItemType Directory -Force -Path build, build/darwin, build/windows, dist/onetiny-gui-windows-x64 | Out-Null
          Copy-Item internal/gui/assets/appicon.png build/appicon.png

          wails3 generate icons -input build/appicon.png -macfilename build/darwin/icons.icns -windowsfilename build/windows/icon.ico
          if (!(Test-Path build/windows/icon.ico)) {
            throw "Windows icon was not generated"
          }

          wails3 generate syso `
            -arch amd64 `
            -icon build/windows/icon.ico `
            -manifest internal/gui/assets/windows/wails.exe.manifest `
            -info internal/gui/assets/windows/info.json `
            -out cmd/gui/rsrc_windows_amd64.syso
          if (!(Test-Path cmd/gui/rsrc_windows_amd64.syso)) {
            throw "Windows resource syso was not generated"
          }

          go build `
            -trimpath `
            -ldflags "-s -w -H windowsgui -X github.com/tcp404/OneTiny/internal/constant.VERSION=$env:VERSION" `
            -o dist/onetiny-gui-windows-x64/OneTiny.exe `
            ./cmd/gui

      - name: Archive Windows GUI
        run: Compress-Archive -Path dist/onetiny-gui-windows-x64/OneTiny.exe -DestinationPath dist/onetiny-gui-windows-x64.zip

      - name: Upload Windows GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: onetiny-gui-windows-x64
          path: dist/onetiny-gui-windows-x64.zip
          if-no-files-found: error

  github-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - cli
      - mac-app
      - windows-gui
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.zip > onetiny-checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${REPOSITORY}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" artifacts/* --repo "${REPOSITORY}" --clobber
          else
            gh release create "${RELEASE_TAG}" artifacts/* \
              --repo "${REPOSITORY}" \
              --draft \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
