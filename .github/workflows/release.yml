name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag to build and publish, for example v0.6.1"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build and publish, for example v0.6.1"
        required: true
        type: string

permissions:
  contents: write

env:
  TASK_VERSION: v3.52.0
  WAILS_VERSION: v3.0.0-alpha.98-tui

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Extract version from tag
        id: metadata
        env:
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  cli:
    name: CLI ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: prepare-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            goos: linux
            goarch: amd64
            artifact: onetiny-cli-linux-x64
          - target: windows-x64
            goos: windows
            goarch: amd64
            artifact: onetiny-cli-windows-x64
          - target: darwin-x64
            goos: darwin
            goarch: amd64
            artifact: onetiny-cli-darwin-x64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            artifact: onetiny-cli-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install Task
        run: go install "github.com/go-task/task/v3/cmd/task@${TASK_VERSION}"

      - name: Build CLI
        run: task dist:cli TARGET=${{ matrix.goos }}-${{ matrix.goarch }} VERSION=${{ inputs.tag_name }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip
          if-no-files-found: error

  mac-app:
    name: macOS app
    runs-on: macos-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install build tools
        run: |
          brew install librsvg
          go install "github.com/go-task/task/v3/cmd/task@${TASK_VERSION}"
          go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"

      - name: Build macOS app
        run: task dist:gui TARGET=darwin-arm64 VERSION=${{ inputs.tag_name }}

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v7
        with:
          name: onetiny-gui-darwin-arm64
          path: dist/onetiny-gui-darwin-arm64.zip
          if-no-files-found: error

  windows-gui:
    name: Windows GUI
    runs-on: windows-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Wails CLI
        run: |
          go install "github.com/go-task/task/v3/cmd/task@$env:TASK_VERSION"
          go install "github.com/wailsapp/wails/v3/cmd/wails3@$env:WAILS_VERSION"

      - name: Build Windows GUI
        run: task dist:gui TARGET=windows-amd64 VERSION=${{ inputs.tag_name }}

      - name: Upload Windows GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: onetiny-gui-windows-x64
          path: dist/onetiny-gui-windows-x64.zip
          if-no-files-found: error

  github-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - cli
      - mac-app
      - windows-gui
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install Task
        run: go install "github.com/go-task/task/v3/cmd/task@${TASK_VERSION}"

      - name: Generate checksums
        run: task dist:checksums DIST_DIR=artifacts

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${REPOSITORY}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" artifacts/* --repo "${REPOSITORY}" --clobber
          else
            gh release create "${RELEASE_TAG}" artifacts/* \
              --repo "${REPOSITORY}" \
              --draft \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
